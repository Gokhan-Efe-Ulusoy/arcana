<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCANA — Gizem, Mit ve Hakikat Ansiklopedisi</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ... (Stil bölümleriniz aynı kalıyor, ancak JS etkileşimi için birkaç ekleme yapıldı) ... */
:root {
  --ink: #0a0c10; --ink2: #111520; --navy: #0d1428; --navy2: #131c35;
  --gold: #c8973a; --gold-light: #e4b96a; --gold-pale: #f2d9a0;
  --gold-dim: rgba(200,151,58,0.18); --gold-ghost: rgba(200,151,58,0.07);
  --silver: #8a9ab8; --silver-dim: #4a5570; --text: #c8cdd8;
  --text-dim: #6a7590; --border: rgba(200,151,58,0.2);
  --border2: rgba(200,151,58,0.08); --red-muted: #8b3a3a;
  --f-display: 'Cinzel Decorative', serif; --f-heading: 'Cinzel', serif; --f-body: 'Cormorant Garamond', serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; font-size: 16px; }
body { background: var(--ink); color: var(--text); font-family: var(--f-body); line-height: 1.75; overflow-x: hidden; min-height: 100vh; }
.hidden { display: none !important; }

/* Mevcut CSS kodlarınızın devamı buraya gelecek... */
/* (Hız kazanmak için tasarım CSS'inizi koruduğunuzu varsayıyorum) */

/* JS Fade / Reveal */
.js-reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
.js-reveal.visible { opacity: 1; transform: translateY(0); }

/* Modal Styles */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(5,8,16,0.95); z-index: 1000;
  display: none; align-items: flex-start; justify-content: center; padding: 40px 20px;
  overflow-y: auto; backdrop-filter: blur(8px);
}
.modal-overlay.open { display: flex; }
.modal { background: var(--navy); border: 1px solid var(--border); max-width: 760px; width: 100%; position: relative; padding: 40px; }
.modal-close { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--border); color: var(--gold); cursor: pointer; padding: 5px 10px; }
</style>
</head>
<body>

<header class="masthead">
  <h1 class="masthead-title">ARCANA</h1>
  <p class="masthead-sub">İnsanlığın kayıp bilgeliği ve gizem gelenekleri.</p>
</header>

<nav class="topnav">
  <a href="#" class="active">Ana Sayfa</a>
  <a href="#antik-mitoloji">Antik Mitoloji</a>
  <a href="#sidebar-search">Arşiv</a>
</nav>

<div class="page-wrap">
  <main>
    <section id="antik-mitoloji" class="category-strip">
        <div class="section-label"><span class="section-label-text">Antik Mitoloji</span></div>
        <div class="entry-grid">
            <div class="entry-card js-reveal" data-article="anunnaki">
                <div class="card-number">01</div>
                <div class="card-title">Anunnaki: Tanrılar mı?</div>
                <div class="card-body">Sümer tabletlerindeki gizemli figürler...</div>
                <button class="read-more-link">Devamını Oku →</button>
            </div>
        </div>
    </section>
  </main>

  <aside class="sidebar">
    <div class="sb-block" id="sidebar-search">
      <div class="sb-title">İndeks Filtrele</div>
      <div class="search-wrap">
        <input type="text" id="indexSearch" class="search-input" placeholder="Madde ara...">
        <span class="search-count" id="searchCount"></span>
      </div>
      <ul class="index-list" id="indexList">
        <li data-terms="anunnaki sumer tanrilar"><span class="il-name">Anunnaki</span><span class="il-tag">Mitoloji</span></li>
        <li data-terms="atlantis kayip kita platon"><span class="il-name">Atlantis</span><span class="il-tag">Uygarlık</span></li>
      </ul>
    </div>
  </aside>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <button class="modal-close" id="closeModal">KAPAT</button>
        <div id="modalContent">
            <h2 class="modal-title" id="mTitle"></h2>
            <div class="modal-body" id="mBody"></div>
        </div>
    </div>
</div>

<script>
/* ── ARŞİV VE ARAMA FONKSİYONU ──────────────── */
const searchInput = document.getElementById("indexSearch");
const indexItems = document.querySelectorAll("#indexList li");
const countDisplay = document.getElementById("searchCount");

function normalizeText(text) {
    return text.toLowerCase()
        .replace(/ı/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u')
        .replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c')
        .trim();
}

if(searchInput) {
    searchInput.addEventListener("input", () => {
        const query = normalizeText(searchInput.value);
        let visibleCount = 0;

        indexItems.forEach(item => {
            const text = normalizeText(item.dataset.terms + " " + item.textContent);
            const isMatch = text.includes(query);
            item.classList.toggle("hidden", !isMatch);
            if(isMatch) visibleCount++;
        });

        countDisplay.textContent = query ? `${visibleCount} sonuç bulundu` : "";
    });
}

/* ── MODAL SİSTEMİ ─────────────────────────── */
const modalOverlay = document.getElementById("modalOverlay");
const closeModal = document.getElementById("closeModal");
const cards = document.querySelectorAll(".entry-card");

const articleData = {
    anunnaki: {
        title: "Anunnaki: Gökten Gelenler",
        body: "Sümer mitolojisinde Anunnaki, gökyüzü tanrısı Anu'nun soyundan gelen bir grup tanrıyı temsil eder..."
    }
};

cards.forEach(card => {
    card.addEventListener("click", () => {
        const id = card.getAttribute("data-article");
        if(articleData[id]) {
            document.getElementById("mTitle").textContent = articleData[id].title;
            document.getElementById("mBody").innerHTML = `<p>${articleData[id].body}</p>`;
            modalOverlay.classList.add("open");
            document.body.style.overflow = "hidden"; // Kaydırmayı engelle
        }
    });
});

closeModal.addEventListener("click", () => {
    modalOverlay.classList.remove("open");
    document.body.style.overflow = "auto";
});

/* ── REVEAL ANIMATION ──────────────────────── */
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if(entry.isIntersecting) {
            entry.target.classList.add("visible");
        }
    });
}, { threshold: 0.1 });

document.querySelectorAll(".js-reveal").forEach(el => observer.observe(el));

</script>
</body>
</html>
